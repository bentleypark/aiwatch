name = "aiwatch-worker"
workers_dev = true
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ALLOWED_ORIGIN = "https://ai-watch.dev,https://www.ai-watch.dev,https://aiwatch-dev.vercel.app"
# Local dev override: create worker/.dev.vars with ALLOWED_ORIGIN=*

[[kv_namespaces]]
binding = "STATUS_CACHE"
id = "e49508d80bb144e9a7ff872f2be771a4" # Not a secret — KV namespace IDs are public identifiers, inaccessible without API token

[triggers]
crons = ["*/5 * * * *"]
