    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AIWatch",
      "url": "https://ai-watch.dev",
      "description": "Real-time status monitoring for 30 AI services including Claude, ChatGPT, Gemini, and Cursor",
      "applicationCategory": "DeveloperApplication",

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply theme before React hydrates to prevent FOUC (flash of wrong theme).
      // Default is dark (no data-theme attribute = dark CSS variables).
      // Firefox may default to light color-scheme if system is light — explicitly remove data-theme for dark.
      (function() {
        try {
          var t = localStorage.getItem('aiwatch-theme');
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else if (t === 'system') {
            if (window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches)
              document.documentElement.setAttribute('data-theme', 'light');
            else
              document.documentElement.removeAttribute('data-theme');
          } else {
            // null, 'dark', or unrecognized → force dark
            document.documentElement.removeAttribute('data-theme');
          }
        } catch(e) {
          document.documentElement.removeAttribute('data-theme');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
