<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI API 서비스 실시간 모니터링 대시보드" />
    <title>AIWatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply theme before React hydrates to prevent FOUC (flash of wrong theme)
      (function() {
        try {
          var t = localStorage.getItem('aiwatch-theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
          else if (t === 'system') {
            if (window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches)
              document.documentElement.setAttribute('data-theme', 'light');
          }
          // default (null, 'dark', or anything else) = dark = no attribute needed
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
